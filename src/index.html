<!doctype html>
<html lang="en">
  <head>
    <script async type="module">
      console.log("Starting to parse Javascript at:" + Date.now());

      import { EventListComponent } from "./ui/list/EventListComponent.js";
      import { LoadingIndicatorComponent } from "./shared/components/LoadingIndicatorComponent.js";
      import { LoginStatusComponent } from "./ui/shared/LoginStatusComponent.js";
      import { SearchComponent } from "./ui/list/SearchComponent.js";
      import { UserActionsComponent } from "./ui/shared/UserActionsComponent.js";

      customElements.define("event-list-component", EventListComponent);
      customElements.define("search-component", SearchComponent);
      customElements.define(
        "loading-indicator-component",
        LoadingIndicatorComponent,
      );

      customElements.define("login-status-component", LoginStatusComponent);
      customElements.define("user-actions-component", UserActionsComponent);
    </script>
    <meta charset="UTF-8" />
    <style
      src="../public/styles/sharedHtmlAndComponentStyles.css"
    ></style>
    <style
      src="../public/styles/sharedHtmlOnlyStyles.css"
    ></style>
    <link rel="preconnect" href="api.gatherspiel.com" />
    <link rel="icon" type="image/ico" href="/assets/images/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DMV Board Games</title>
  </head>
  <body>
      {{>navbar}}
      <user-actions-component> </user-actions-component>
      <search-component
        api-url="/searchEvents"
        class="ui-section"
        search-text="Search events"
      >
      </search-component>
      <event-list-component></event-list-component>

    <div id="bot-container"></div>
    {{>footer}}
  </body>
</html>
